spring.application.name=learning-platform

# Kết nối tới Database learning-db trong Docker
spring.datasource.url=jdbc:postgresql://localhost:5433/learning_web_platform
spring.datasource.username=postgres
spring.datasource.password=123456

# Cấu hình Hibernate tự động tạo bảng từ code Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Tạm thời tắt Security mặc định để test
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration